<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pertemuan 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="" method="">
        <h1 style="color: royalblue; text-align: center; margin-top: 0; font-family: sans-serif; font-size: 20px; text-transform: uppercase; border-bottom: 2px solid royalblue; padding-bottom: 10px; margin-bottom: 20px;">
            Formulir Pendaftaran Klub
        </h1>

        <label for="Nama Lengkap">Nama Lengkap:</label>
        <input class="border-usr" type="text" name="username" placeholder="Masukan">
        <br>
        <label for="email">Alamat Email:</label>
        <input class="border-usr" type="text" name="email" placeholder="Masukan Email">
        <br>
        <label for="Jenis Jenis-Kelamin">Jenis kelamin</label>
        <br>
        <input type="radio" name="Jenis-Kelamin" value="Laki-laki">Laki-laki
        <input type="radio" name="Jenis-Kelamin" value="Perempuan">Perempuan
        <br>
        <label for="kota">Asal Kota:</label><br>
        <select id="kota" name="kota">
            <option value="jakarta">Jakarta</option>
            <option value="bandung">Bandung</option>
            <option value="surabaya">Surabaya</option>
            <option value="karawang">Karawang</option>
            <option value="bekasi">Bekasi</option>
            <option value="lainnya">Lainnya</option>
        </select>
        <br>
        <label for="Hobi">Hobi</label>
        <br>
        <label>Hobi (Boleh pilih lebih dari satu):</label><br>
        <input type="checkbox" id="hobi1" name="hobi" value="Membaca">
        <label for="hobi1">Membaca</label>
        <br>
        <input type="checkbox" id="hobi2" name="hobi" value="Olahraga">
        <label for="hobi2">Olahraga</label>
        <br>
        <input type="checkbox" id="hobi3" name="hobi" value="Musik">
        <label for="hobi3">Musik</label>
        <br>
        <input type="checkbox" id="hobi4" name="hobi" value="Traveling">
        <label for="hobi4">Traveling</label>
        <br>
        <label for="File">Image</label>
        <br>
        <input type="file" name="image" accept=".jpg, .png">
        <br>
        
        <button type="submit">Unggah</button>
    </form> 
</body>
</html>
